env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  FakeSource {
    plugin_output = "source1"

    tables_configs = [
      {
        row.num = 1
        schema = {
          table = "test.regex"
          columns = [
            {
              name = "InvoiceNum"
              type = "bigint"
            },
            {
              name = "VendorID"
              type = "string"
            }
          ]
        }
      }
    ]
  }
}

transform {
  FieldRename {
    plugin_input = "source1"
    plugin_output = "transform1"

    convert_case = "LOWER"
    # intentionally omit is_regex to verify default behavior
    replacements_with_regex = [
      {
        replace_from = "(?<=[a-z0-9])(?=[A-Z])"
        replace_to = "_"
      }
    ]
  }
}

sink {
  Assert {
    plugin_input = "transform1"

    rules =
      {
        tables_configs = [
          {
            table_path = "test.regex"
            row_rules = [
              {
                rule_type = MAX_ROW
                rule_value = 1
              },
              {
                rule_type = MIN_ROW
                rule_value = 1
              }
            ],
            catalog_table_rule {
              table_path = "test.regex"
              column_rule = [
                {
                  name = "invoice_num"
                  type = "bigint"
                },
                {
                  name = "vendor_id"
                  type = "string"
                }
              ]
            }
          }
        ]
      }
  }
}
