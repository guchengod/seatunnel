######
###### This config file is a demonstration of streaming processing in seatunnel config
######

env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  FakeSource {
    plugin_output = "fake"
    schema = {
      fields {
        id = "int"
        name = "string"
        nullable_field = "string"
        nested_data = {
            inner_field = "string"
            inner_nullable = "string"
        }
      }
    }
    rows = [
      {
        kind = INSERT
        fields = [1, "Test Name", null, null]
      }
    ]
  }
}

transform {
  sql {
    plugin_input = "fake"
    plugin_output = "fake1"
    query = "select id, name, nullable_field, nested_data.inner_field, nested_data.inner_nullable, nested_data.inner_field as copied_field from fake"
  }
}

sink {
  Assert {
    plugin_input = "fake1"
    rules = {
      field_rules = [
        {
          field_name = "id"
          field_type = "int"
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        },
        {
          field_name = "name"
          field_type = "string"
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        },
        {
          field_name = "nullable_field"
          field_type = "string"
          field_value = [
             {
               rule_type = NULL
             }
          ]
        },
        {
          field_name = "inner_field"
          field_type = "string"
          field_value = [
             {
               rule_type = NULL
             }
          ]
        },
        {
          field_name = "inner_nullable"
          field_type = "string"
          field_value = [
             {
               rule_type = NULL
             }
          ]
        },
        {
          field_name = "copied_field"
          field_type = "string"
          field_value = [
             {
               rule_type = NULL
             }
          ]
        }
      ]
    }
  }
}