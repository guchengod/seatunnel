######
###### This config file is a demonstration of streaming processing in seatunnel config
######

env {
  job.mode = "BATCH"
}

source {
  FakeSource {
    tables_configs = [
      {
        string.fake.mode = "template"
        string.template = ["value1"]
        row.num = 100
        schema = {
          table = "test.abc"
          columns = [
            {
              name = "id"
              type = "bigint"
            },
            {
              name = "name"
              type = "string"
            },
            {
              name = "title"
              type = "string"
            }
          ]
        }
      },
      {
        string.fake.mode = "template"
        string.template = ["value1"]
        row.num = 100
        schema = {
          table = "test.xyz"
          columns = [
            {
              name = "id"
              type = "bigint"
            },
            {
              name = "name"
              type = "string"
            },
            {
              name = "title"
              type = "string"
            }
          ]
        }
      },
      {
        string.fake.mode = "template"
        string.template = ["value1"]
        row.num = 100
        schema = {
          table = "test.www"
          columns = [
            {
              name = "id"
              type = "bigint"
            },
            {
              name = "name"
              type = "string"
            },
            {
              name = "title"
              type = "string"
            }
          ]
        }
      }
    ]
  }
}

transform {
  Replace {
    table_match_regex = "test.a.*"
    table_transform = [{
      table_path = "test.xyz"
      replace_fields = ["name", "title"]
      pattern = ".+"
      replacement = "b"
      is_regex = true
      replace_first = true
    }]
    replace_fields = ["name", "title"]
    pattern = ".+"
    replacement = "b"
    is_regex = true
    replace_first = true
  }
}

sink {
  Assert {
    rules =
      {
        tables_configs = [
          {
            table_path = "test.abc"
            field_rules = [
              {
                field_name = name
                field_type = string
                field_value = [
                  {
                    rule_type = MIN_LENGTH
                    rule_value = 1
                  },
                  {
                    rule_type = MAX_LENGTH
                    rule_value = 1
                  }
                ]
              },
              {
                field_name = title
                field_type = string
                field_value = [
                  {
                    rule_type = MIN_LENGTH
                    rule_value = 1
                  },
                  {
                    rule_type = MAX_LENGTH
                    rule_value = 1
                  }
                ]
              }
            ]
          },
          {
            table_path = "test.xyz"
            field_rules = [
              {
                field_name = name
                field_type = string
                field_value = [
                  {
                    rule_type = MIN_LENGTH
                    rule_value = 1
                  },
                  {
                    rule_type = MAX_LENGTH
                    rule_value = 1
                  }
                ]
              },
              {
                field_name = title
                field_type = string
                field_value = [
                  {
                    rule_type = MIN_LENGTH
                    rule_value = 1
                  },
                  {
                    rule_type = MAX_LENGTH
                    rule_value = 1
                  }
                ]
              }
            ]
          },
          {
            table_path = "test.www"
            field_rules = [
              {
                field_name = name
                field_type = string
                field_value = [
                  {
                    rule_type = MIN_LENGTH
                    rule_value = 6
                  },
                  {
                    rule_type = MAX_LENGTH
                    rule_value = 6
                  }
                ]
              },
              {
                field_name = title
                field_type = string
                field_value = [
                  {
                    rule_type = MIN_LENGTH
                    rule_value = 6
                  },
                  {
                    rule_type = MAX_LENGTH
                    rule_value = 6
                  }
                ]
              }
            ]
          }
        ]
      }
  }
}
