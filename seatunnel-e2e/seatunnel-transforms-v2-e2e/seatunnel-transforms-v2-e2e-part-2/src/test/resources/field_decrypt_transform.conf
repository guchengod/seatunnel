######
###### This config file is a demonstration of streaming processing in seatunnel config
######

env {
  job.mode = "BATCH"
}

source {
  FakeSource {
    string.fake.mode = "template"
    string.template = ["fiXRwCuTG+B0PdQfEzvML589AF/uveSHemzy3KH/Mas="]
    schema {
        fields {
          id = bigint
          name = string
          age = smallint
        }
      }
  }
}

transform {
  FieldEncrypt {
	fields = ["name"]
    key = "base64:AAAAAAAAAAAAAAAAAAAAAA=="
    algorithm = "AES_CBC"
    mode = "decrypt"
  }
}

sink {
  Assert {
    rules =
      {
        field_rules = [{
          field_name = name
          field_type = string
          field_value = [
            {
              equals_to = "value1"
            }
          ]
        }]
      }
  }
}