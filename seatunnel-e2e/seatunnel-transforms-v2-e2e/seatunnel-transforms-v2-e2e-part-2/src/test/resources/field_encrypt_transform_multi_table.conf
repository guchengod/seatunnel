######
###### This config file is a demonstration of streaming processing in seatunnel config
######

env {
  job.mode = "BATCH"
}

source {
  FakeSource {
    tables_configs = [
      {
        string.fake.mode = "template"
        string.template = ["value1"]
        row.num = 100
        schema = {
          table = "test.abc"
          columns = [
            {
              name = "id"
              type = "bigint"
            },
            {
              name = "name"
              type = "string"
            },
            {
              name = "address"
              type = "string"
            }
          ]
        }
      },
      {
        string.fake.mode = "template"
        string.template = ["value1"]
        row.num = 100
        schema = {
          table = "test.xyz"
          columns = [
            {
              name = "id"
              type = "bigint"
            },
            {
              name = "name"
              type = "string"
            },
            {
              name = "age"
              type = "int"
            }
          ]
        }
      },
      {
        string.fake.mode = "template"
        string.template = ["value1"]
        row.num = 100
        schema = {
          table = "test.www"
          columns = [
            {
              name = "id"
              type = "bigint"
            },
            {
              name = "name"
              type = "string"
            },
            {
              name = "address"
              type = "string"
            }
          ]
        }
      }
    ]
  }
}

transform {
  FieldEncrypt {
	fields = ["name"]
    key = "base64:AAAAAAAAAAAAAAAAAAAAAA=="
    algorithm = "AES_CBC"
    mode = "ENCRYPT"

    table_transform = [
      {
        table_path = "test.abc"
        fields = ["name", "address"]
        key = "base64:AAAAAAAAAAAAAAAAAAAAAA=="
        algorithm = "AES_CBC"
        mode = "ENCRYPT"
      }
    ]
  }
}

sink {
  Assert {
    rules =
      {
        tables_configs = [
            {
                table_path = "test.abc"
                field_rules = [
                {
                  field_name = name
                  field_type = string
                  field_value = [
                    {
                       rule_type = MIN_LENGTH
                       rule_value = 44
                    },
                    {
                       rule_type = MAX_LENGTH
                       rule_value = 44
                    }
                  ]
                },
                {
                    field_name = address
                    field_type = string
                    field_value = [
                      {
                         rule_type = MIN_LENGTH
                         rule_value = 44
                      },
                      {
                         rule_type = MAX_LENGTH
                         rule_value = 44
                      }
                    ]
                }
               ]
           },
          {
            table_path = "test.xyz"
            field_rules = [
            {
              field_name = name
              field_type = string
              field_value = [
                {
                   rule_type = MIN_LENGTH
                   rule_value = 44
                },
                {
                   rule_type = MAX_LENGTH
                   rule_value = 44
                }
              ]
            }
            ]
          },
          {
            table_path = "test.www"
            field_rules = [
            {
              field_name = name
              field_type = string
              field_value = [
                {
                   rule_type = MIN_LENGTH
                   rule_value = 44
                },
                {
                   rule_type = MAX_LENGTH
                   rule_value = 44
                }
              ]
            },
            {
                field_name = address
                field_type = string
                field_value = [
                  {
                     rule_type = MIN_LENGTH
                     rule_value = 6
                  },
                  {
                     rule_type = MAX_LENGTH
                     rule_value = 6
                  }
                ]
            }
            ]
          }
        ]
      }
  }
}