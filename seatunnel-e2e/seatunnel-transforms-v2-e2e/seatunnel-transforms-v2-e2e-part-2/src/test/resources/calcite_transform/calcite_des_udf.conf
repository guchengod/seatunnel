env {
  job.mode = "BATCH"
}

source {
  FakeSource {
    plugin_output = "fake"
    schema = {
      fields {
        id = "int"
        secret = "string"
      }
    }
    rows = [
      {fields = [1, "seatunnel-transform"], kind = INSERT},
      {fields = [2, "seatunnel-connector"], kind = INSERT}
    ]
  }
}

transform {
  Calcite {
    plugin_input = "fake"
    plugin_output = "encrypted"
    sql = "SELECT id, secret, DES_ENCRYPT('12345678', secret) AS encrypted_val FROM fake"
  }

  Calcite {
    plugin_input = "encrypted"
    plugin_output = "decrypted"
    sql = "SELECT id, secret, encrypted_val, DES_DECRYPT('12345678', encrypted_val) AS decrypted_val FROM encrypted"
  }
}

sink {
  Assert {
    plugin_input = "decrypted"
    rules = {
      row_rules = [
        {
          rule_type = MIN_ROW
          rule_value = 2
        }
      ]
      field_rules = [
        {
          field_name = encrypted_val
          field_type = string
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        },
        {
          field_name = decrypted_val
          field_type = string
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        }
      ]
    }
  }
}
