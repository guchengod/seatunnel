env {
  job.mode = "BATCH"
}

source {
  FakeSource {
    plugin_output = "fake"
    schema = {
      fields {
        id = "int"
        phone = "string"
      }
    }
    rows = [
      {fields = [1, "13812345678"], kind = INSERT},
      {fields = [2, "13987654321"], kind = INSERT}
    ]
  }
}

transform {
  Calcite {
    plugin_input = "fake"
    plugin_output = "calcite_out"
    sql = "SELECT id, MASK(phone, 3, 7, '*') AS masked_phone, MASK_HASH(phone) AS phone_hash FROM fake"
  }
}

sink {
  Assert {
    plugin_input = "calcite_out"
    rules = {
      row_rules = [
        {
          rule_type = MIN_ROW
          rule_value = 2
        }
      ]
      field_rules = [
        {
          field_name = masked_phone
          field_type = string
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        },
        {
          field_name = phone_hash
          field_type = string
          field_value = [
            {
              rule_type = NOT_NULL
            },
            {
              rule_type = MIN_LENGTH
              rule_value = 64
            }
          ]
        }
      ]
    }
  }
}
