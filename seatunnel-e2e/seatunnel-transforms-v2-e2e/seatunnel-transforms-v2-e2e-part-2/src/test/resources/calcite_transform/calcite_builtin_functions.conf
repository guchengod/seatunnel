env {
  job.mode = "BATCH"
}

source {
  FakeSource {
    plugin_output = "fake"
    row.num = 100
    schema = {
      fields {
        id = "int"
        name = "string"
        age = "int"
      }
    }
  }
}

transform {
  Calcite {
    plugin_input = "fake"
    plugin_output = "calcite_out"
    sql = "SELECT id, UPPER(name) AS name_upper, ABS(age) AS abs_age, COALESCE(name, 'unknown') AS safe_name FROM fake"
  }
}

sink {
  Assert {
    plugin_input = "calcite_out"
    rules = {
      row_rules = [
        {
          rule_type = MIN_ROW
          rule_value = 100
        }
      ]
      field_rules = [
        {
          field_name = name_upper
          field_type = string
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        },
        {
          field_name = abs_age
          field_type = int
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        }
      ]
    }
  }
}
