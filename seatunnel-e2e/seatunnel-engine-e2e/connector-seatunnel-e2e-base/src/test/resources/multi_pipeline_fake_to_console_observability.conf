env {
  parallelism = 1
  job.mode = "BATCH"

  engine {
    observability {
      enabled = true
      bucket_ms = 5000
      retention_minutes = 10
      edge_buffer_capacity = 50
      split_sink_io = true
      async_boundaries = ["p1_t_replace", "p1_t_sql", "p2_t_field_mapper"]
    }
  }
}

source {
  FakeSource {
    plugin_output = "p1"
    parallelism = 1
    row.num = 1000000000
    split.num = 1
    split.read-interval = 0
    schema = {
      fields {
        name = "string"
        age = "int"
      }
    }
  }

  FakeSource {
    plugin_output = "p2"
    parallelism = 1
    row.num = 1000000000
    split.num = 1
    split.read-interval = 0
    schema = {
      fields {
        name = "string"
        age = "int"
      }
    }
  }
}

transform {
  Replace {
    name = "p1_t_replace"
    plugin_input = "p1"
    plugin_output = "p1_1"
    replace_field = "name"
    pattern = ".+"
    replacement = "demo"
    is_regex = true
    replace_first = true
  }

  Sql {
    name = "p1_t_sql"
    plugin_input = "p1_1"
    plugin_output = "p1_2"
    query = "select name, age, concat(name, '_x') as name2 from dual"
  }

  FieldMapper {
    name = "p2_t_field_mapper"
    plugin_input = "p2"
    plugin_output = "p2_1"
    field_mapper = {
      name = "name"
      age = "age"
    }
  }
}

sink {
  console {
    plugin_input = "p1_2"
    log.print.data = false
    log.print.delay.ms = 50
  }

  console {
    plugin_input = "p2_1"
    log.print.data = false
    log.print.delay.ms = 50
  }
}
