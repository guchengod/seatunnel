env {
  job.mode = BATCH
  checkpoint.interval = 2000
  parallelism = 5
}

source {
  FakeSource {
    plugin_output = table1
    row.num = 500
    split.num = 5
    split.read-interval = 500
    schema = {
      fields {
        c_string = string
        c_int    = int
      }
    }
  }

  FakeSource {
    plugin_output = table2
    row.num = 500
    split.num = 5
    split.read-interval = 500
    schema = {
      fields {
        c_string = string
        c_int    = int
      }
    }
  }

  FakeSource {
    plugin_output = table3
    row.num = 500
    split.num = 5
    split.read-interval = 500
    schema = {
      fields {
        c_string = string
        c_int    = int
      }
    }
  }

  FakeSource {
    plugin_output = table4
    row.num = 500
    split.num = 5
    split.read-interval = 500
    schema = {
      fields {
        c_string = string
        c_int    = int
      }
    }
  }

  FakeSource {
    plugin_output = table5
    row.num = 500
    split.num = 5
    split.read-interval = 500
    schema = {
      fields {
        c_string = string
        c_int    = int
      }
    }
  }
}

transform {
}

sink {
  LocalFile {
    plugin_input = table1
    path = "/tmp/hive/warehouse/${dynamic_test_case_name}"
    field_delimiter = "\t"
    row_delimiter = "\n"
    file_name_expression = "${transactionId}_${now}"
    file_format_type = "text"
    filename_time_format = "yyyy.MM.dd"
    is_enable_transaction = true
    save_mode = "error"
  }

  LocalFile {
    plugin_input = table2
    path = "/tmp/hive/warehouse/${dynamic_test_case_name}"
    field_delimiter = "\t"
    row_delimiter = "\n"
    file_name_expression = "${transactionId}_${now}"
    file_format_type = "text"
    filename_time_format = "yyyy.MM.dd"
    is_enable_transaction = true
    save_mode = "error"
  }

  LocalFile {
    plugin_input = table3
    path = "/tmp/hive/warehouse/${dynamic_test_case_name}"
    field_delimiter = "\t"
    row_delimiter = "\n"
    file_name_expression = "${transactionId}_${now}"
    file_format_type = "text"
    filename_time_format = "yyyy.MM.dd"
    is_enable_transaction = true
    save_mode = "error"
  }

  LocalFile {
    plugin_input = table4
    path = "/tmp/hive/warehouse/${dynamic_test_case_name}"
    field_delimiter = "\t"
    row_delimiter = "\n"
    file_name_expression = "${transactionId}_${now}"
    file_format_type = "text"
    filename_time_format = "yyyy.MM.dd"
    is_enable_transaction = true
    save_mode = "error"
  }

  LocalFile {
    plugin_input = table5
    path = "/tmp/hive/warehouse/${dynamic_test_case_name}"
    field_delimiter = "\t"
    row_delimiter = "\n"
    file_name_expression = "${transactionId}_${now}"
    file_format_type = "text"
    filename_time_format = "yyyy.MM.dd"
    is_enable_transaction = true
    save_mode = "error"
  }
}
