env {
  parallelism = 1
  job.mode = "BATCH"

  # You can set spark configuration here
  spark.app.name = "SeaTunnel"
  spark.executor.instances = 1
  spark.executor.cores = 1
  spark.executor.memory = "1g"
  spark.master = "local"
}

source {
  S3File {
    fs.s3a.endpoint = "http://s3:9000"
    hadoop_s3_properties={
     "fs.s3a.path.style.access"="true"
     "fs.s3a.statistics.enable"="false"
    }
    fs.s3a.aws.credentials.provider = "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"
    access_key = "minioadmin"
    secret_key = "minioadmin"
    bucket = "s3a://ws-package"
    path = "/test/seatunnel/read/filter"
    file_filter_pattern = ".*.json"
    file_format_type = "json"
    schema = {
      fields {
        c_string = string
      }
    }
  }
}

sink {
  Assert {
    rules = {
      row_rules = [
        {
          rule_type = MAX_ROW
          rule_value = 15
        },
        {
          rule_type = MIN_ROW
          rule_value = 15
        }
      ]
      field_rules = [
        {
          field_name = "c_string"
          field_type = "string"
          field_value = [
            { rule_type = NOT_NULL },
            { rule_type = MIN_LENGTH, rule_value = 5 },
            { rule_type = MAX_LENGTH, rule_value = 5 }
          ]
        }
      ]
    }
  }
}