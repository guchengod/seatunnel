env {
  parallelism = 1
  job.mode = "BATCH"
  spark.app.name = "SeaTunnel"
  spark.executor.instances = 2
  spark.executor.cores = 1
  spark.executor.memory = "1g"
  spark.master = local
}

source {
  LocalFile {
    path = "/seatunnel/read/markdown/e2e.md"
    file_format_type = "markdown"
    markdown_rag_metadata_enabled = true
  }
}

sink {
  Assert {
    rules {
      row_rules = [
        {
          rule_type = MAX_ROW
          rule_value = 1
        },
        {
          rule_type = MIN_ROW
          rule_value = 1
        }
      ],
      field_rules = [
        {
          field_name = element_id
          field_type = string
          field_value = [
            {
              equals_to = "Heading_1"
            }
          ]
        },
        {
          field_name = element_type
          field_type = string
          field_value = [
            {
              equals_to = "Heading"
            }
          ]
        },
        {
          field_name = heading_level
          field_type = int
          field_value = [
            {
              equals_to = 1
            }
          ]
        },
        {
          field_name = text
          field_type = string
          field_value = [
            {
              equals_to = "E2E Markdown RAG"
            }
          ]
        },
        {
          field_name = parent_id
          field_type = string
          field_value = [
            {
              rule_type = NULL
            }
          ]
        },
        {
          field_name = source_uri
          field_type = string
          field_value = [
            {
              equals_to = "/seatunnel/read/markdown/e2e.md"
            }
          ]
        },
        {
          field_name = document_id
          field_type = string
          field_value = [
            {
              equals_to = "doc_f9e9a2324852c0fdff7ecea9013e95f3a2361f570b0d5226f2f671ae38d1d1c8"
            }
          ]
        },
        {
          field_name = chunk_id
          field_type = string
          field_value = [
            {
              equals_to = "chunk_b48c799b9daccdb6a04d665be5892bc9efc84795f266f7ec27c5b4fd2f0a5af0"
            }
          ]
        },
        {
          field_name = chunk_index
          field_type = int
          field_value = [
            {
              equals_to = 1
            }
          ]
        },
        {
          field_name = content_hash
          field_type = string
          field_value = [
            {
              equals_to = "6fc6a22e9e5515086f32ea5400fcd490c92cbe0f3707febffb8f97b83abe2f46"
            }
          ]
        }
      ]
    }
  }
}
