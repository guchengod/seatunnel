env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  FakeSource {
    schema = {
      fields {
        Name = string
        Age = int
      }
    }
    rows = [
      {
        kind = INSERT
        fields = ["Alice", 30]
      },
      {
        kind = INSERT
        fields = ["Bob", 25]
      }
    ]
  }
}

sink {
  Airtable {
    api_base_url = "http://mockserver:1080"
    token = "test_token"
    base_id = "appTEST123"
    table = "SinkTable"
    batch_size = 10
    request_interval_ms = 0
  }
}
