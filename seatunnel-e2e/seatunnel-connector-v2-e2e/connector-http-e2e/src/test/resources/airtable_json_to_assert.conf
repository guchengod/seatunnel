env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Airtable {
    plugin_output = "http"
    api_base_url = "http://mockserver:1080"
    token = "test_token"
    base_id = "appTEST123"
    table = "TestTable"
    format = "json"
    content_field = "$.records[*].fields"
    page_size = 2
    request_interval_ms = 0
    schema = {
      fields {
        Name = string
        Age = int
        Status = string
      }
    }
  }
}

sink {
  Assert {
    plugin_input = "http"
    rules {
      row_rules = [
        {
          rule_type = MIN_ROW
          rule_value = 5
        },
        {
          rule_type = MAX_ROW
          rule_value = 5
        }
      ],
      field_rules = [
        {
          field_name = Name
          field_type = string
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        },
        {
          field_name = Age
          field_type = int
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        },
        {
          field_name = Status
          field_type = string
          field_value = [
            {
              rule_type = NOT_NULL
            }
          ]
        }
      ]
    }
  }
}
