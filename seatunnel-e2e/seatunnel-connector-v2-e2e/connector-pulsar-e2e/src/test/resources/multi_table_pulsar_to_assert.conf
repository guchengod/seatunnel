env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Pulsar {
    client.service-url = "pulsar://pulsar.multitable.e2e:6650"
    admin.service-url = "http://pulsar.multitable.e2e:8080"
    cursor.startup.mode = "EARLIEST"
    cursor.stop.mode = "LATEST"
    format = json
    tables_configs = [
      {
        table_path = "db.orders"
        topic = "persistent://public/default/topic-orders"
        subscription.name = "sub-orders"
        schema = {
          fields {
            order_id = int
            amount = double
          }
        }
      },
      {
        table_path = "db.users"
        topic-pattern = "persistent://public/default/topic-users-.*"
        subscription.name = "sub-users"
        schema = {
          fields {
            user_id = int
            name = string
          }
        }
      }
    ]
  }
}

sink {
  Assert {
    rules = {
      table-names = ["db.orders", "db.users"]
      tables_configs = [
        {
          table_path = "db.orders"
          row_rules = [
            {
              rule_type = MAX_ROW
              rule_value = 1
            },
            {
              rule_type = MIN_ROW
              rule_value = 1
            }
          ]
          field_rules = [
            {
              field_name = order_id
              field_type = int
              field_value = [
                {
                  equals_to = 1
                }
              ]
            },
            {
              field_name = amount
              field_type = double
              field_value = [
                {
                  equals_to = 99.9
                }
              ]
            }
          ]
        },
        {
          table_path = "db.users"
          row_rules = [
            {
              rule_type = MAX_ROW
              rule_value = 1
            },
            {
              rule_type = MIN_ROW
              rule_value = 1
            }
          ]
          field_rules = [
            {
              field_name = user_id
              field_type = int
              field_value = [
                {
                  equals_to = 2
                }
              ]
            },
            {
              field_name = name
              field_type = string
              field_value = [
                {
                  equals_to = "bob"
                }
              ]
            }
          ]
        }
      ]
    }
  }
}
