env {
  parallelism = 1
  job.mode = "BATCH"
  shade.identifier = "base64"

  # spark config
  spark.app.name = "SeaTunnel"
  spark.executor.instances = 2
  spark.executor.cores = 1
  spark.executor.memory = "1g"
  spark.master = local
}

source {
  Redis {
    host = "redis-e2e"
    port = 6379
    auth = "U2VhVHVubmVs"

    tables_configs = [
      {
        keys = "multi:hash:*"
        data_type = hash
        batch_size = 10
        hash_key_parse_mode = kv
        schema = {
          table = "hash_table"
          fields {
            hash_key = string
            field_0 = string
            field_1 = string
            field_2 = string
            field_3 = string
            field_4 = string
          }
        }
        format = json
      },
      {
        keys = "multi:list:*"
        data_type = list
        batch_size = 10
        schema = {
          table = "list_table"
          fields {
            c_string = string
          }
        }
        format = json
      },
      {
        keys = "multi:set:*"
        data_type = set
        batch_size = 10
        schema = {
          table = "set_table"
          fields {
            c_string = string
          }
        }
        format = json
      }
    ]
  }
}

sink {
  Redis {
    host = "redis-e2e"
    port = 6379
    auth = "U2VhVHVubmVs"
    key = "mixed-types-result-${table_name}"
    data_type = list
  }
}
