env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Kafka {
    bootstrap.servers = "kafkaCluster:9092"
    topic = "test_topic_text_eventtime"
    plugin_output = "kafka_table"
    start_mode = "earliest"
    format_error_handle_way = fail
    schema = {
      fields {
        id = bigint
        c_map = "map<string, smallint>"
        c_array = "array<tinyint>"
        c_string = string
        c_boolean = boolean
        c_tinyint = tinyint
        c_smallint = smallint
        c_int = int
        c_bigint = bigint
        c_float = float
        c_double = double
        c_decimal = "decimal(2, 1)"
        c_bytes = bytes
        c_date = date
        c_timestamp = timestamp
      }
    }
    format = text
    field_delimiter = ","
  }
}

transform {
  Metadata {
    plugin_input = "kafka_table"
    plugin_output = "kafka_table_with_meta"
    metadata_fields = {
      EventTime = event_time_ms
    }
  }
}

sink {
  Assert {
    plugin_input = "kafka_table_with_meta"
    rules = {
      field_rules = [
        {
          field_name = event_time_ms
          field_type = bigint
          field_value = [
            { rule_type = NOT_NULL }
          ]
        }
      ]
    }
  }
}

