######
###### This config file is a demonstration of streaming processing in seatunnel config
######

env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Kafka {
    bootstrap.servers = "kafkaCluster:9092"
    topic = "test_topic_source_skip_partition"
    plugin_output = "kafka_table"
    # The default format is json, which is optional
    format = json
    start_mode = timestamp
    schema = {
      fields {
        id = bigint
      }
    }
    start_mode.timestamp = 1738396301000
  }

  # If you would like to get more information about how to configure seatunnel and see full list of source plugins,
  # please go to https://seatunnel.apache.org/docs/connectors/source/Kafka
}

transform {
}

sink {
  Assert {
    plugin_input = "kafka_table"
    rules =
      {
        field_rules = [
          {
            field_name = id
            field_type = bigint
            field_value = [

              {
                rule_type = MIN
                rule_value = 101
              },
              {
                rule_type = MAX
                rule_value = 199
              }
            ]
          }
        ]
        row_rules = [
                        {
                          rule_type = MIN_ROW
                          rule_value = 99
                        },
                        {
                          rule_type = MAX_ROW
                          rule_value = 99
                        }
                      ]
      }
  }
}
