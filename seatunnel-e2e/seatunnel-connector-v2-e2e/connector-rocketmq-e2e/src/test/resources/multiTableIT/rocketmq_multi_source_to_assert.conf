env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Rocketmq {
    name.srv.addr = "rocketmq-e2e:9876"
    start.mode = "CONSUME_FROM_LAST_OFFSET"
    tables_configs = [
      {
        topics = "test_topic_multi_a"
        start.mode = "CONSUME_FROM_FIRST_OFFSET"
        format = json
        schema = {
          fields {
            id = bigint
            c_map = "map<string, smallint>"
            c_array = "array<tinyint>"
            c_string = string
            c_boolean = boolean
            c_tinyint = tinyint
            c_smallint = smallint
            c_int = int
            c_bigint = bigint
            c_float = float
            c_double = double
            c_decimal = "decimal(2, 1)"
            c_bytes = bytes
            c_date = date
            c_timestamp = timestamp
          }
        }
      },
      {
        topics = "test_topic_multi_b"
        start.mode = "CONSUME_FROM_FIRST_OFFSET"
        tags = "tag_b"
        format = json
        schema = {
          table = "rocketmq_multi_custom"
          fields {
            id = bigint
            c_map = "map<string, smallint>"
            c_array = "array<tinyint>"
            c_string = string
            c_boolean = boolean
            c_tinyint = tinyint
            c_smallint = smallint
            c_int = int
            c_bigint = bigint
            c_float = float
            c_double = double
            c_decimal = "decimal(2, 1)"
            c_bytes = bytes
            c_date = date
            c_timestamp = timestamp
          }
        }
      }
    ]
  }
}

transform {
}

sink {
  Assert {
    rules = {
      tables_configs = [
        {
          table_path = "test_topic_multi_a"
          row_rules = [
            {rule_type = MIN_ROW, rule_value = 5},
            {rule_type = MAX_ROW, rule_value = 5}
          ]
          field_rules = [
            {
              field_name = id
              field_type = bigint
              field_value = [
                {rule_type = NOT_NULL},
                {rule_type = MIN, rule_value = 0},
                {rule_type = MAX, rule_value = 4}
              ]
            },
            {
              field_name = c_string
              field_type = string
              field_value = [{rule_type = NOT_NULL}]
            }
          ]
        },
        {
          table_path = "rocketmq_multi_custom"
          row_rules = [
            {rule_type = MIN_ROW, rule_value = 3},
            {rule_type = MAX_ROW, rule_value = 3}
          ]
          field_rules = [
            {
              field_name = id
              field_type = bigint
              field_value = [
                {rule_type = NOT_NULL},
                {rule_type = MIN, rule_value = 100},
                {rule_type = MAX, rule_value = 102}
              ]
            },
            {
              field_name = c_string
              field_type = string
              field_value = [{rule_type = NOT_NULL}]
            }
          ]
        }
      ]
    }
  }
}
