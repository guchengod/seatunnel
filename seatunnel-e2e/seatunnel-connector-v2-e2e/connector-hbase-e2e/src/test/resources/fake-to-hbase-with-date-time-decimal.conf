env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  FakeSource {
    schema {
      fields {
        name = string
        c_decimal = "decimal(10, 2)"
        c_date = date
        c_time = time
        c_timestamp = timestamp
      }
    }
    rows = [
      {
        kind = INSERT
        fields = ["A", "999999.90", "2012-12-21", "12:34:56", "2012-12-21T12:34:56"]
      }
    ]
  }
}

sink {
  Hbase {
    zookeeper_quorum = "hbase_e2e:2181"
    table = "seatunnel_test"
    rowkey_column = ["name"]
    family_name {
      all_columns = info
    }
  }
}

