env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  Hbase {
    zookeeper_quorum = "hbase_e2e:2181"
    table = "seatunnel_test"
    query_columns = [
      "rowkey",
      "info:c_decimal",
      "info:c_date",
      "info:c_time",
      "info:c_timestamp"
    ]
    schema = {
      columns = [
        {
          name = rowkey
          type = string
        },
        {
          name = "info:c_decimal"
          type = "decimal(10, 2)"
        },
        {
          name = "info:c_date"
          type = date
        },
        {
          name = "info:c_time"
          type = time
        },
        {
          name = "info:c_timestamp"
          type = timestamp
        }
      ]
    }
  }
}

sink {
  Assert {
    rules {
      row_rules = [
        {
          rule_type = MAX_ROW
          rule_value = 1
        },
        {
          rule_type = MIN_ROW
          rule_value = 1
        }
      ],
      field_rules = [
        {
          field_name = rowkey
          field_type = string
          field_value = [
            {
              equals_to = "A"
            }
          ]
        },
        {
          field_name = "info:c_decimal"
          field_type = "decimal(10, 2)"
          field_value = [
            {
              equals_to = "999999.90"
            }
          ]
        },
        {
          field_name = "info:c_date"
          field_type = date
          field_value = [
            {
              equals_to = "2012-12-21"
            }
          ]
        },
        {
          field_name = "info:c_time"
          field_type = time
          field_value = [
            {
              equals_to = "12:34:56"
            }
          ]
        },
        {
          field_name = "info:c_timestamp"
          field_type = timestamp
          field_value = [
            {
              equals_to = "2012-12-21T12:34:56"
            }
          ]
        }
      ]
    }
  }
}

