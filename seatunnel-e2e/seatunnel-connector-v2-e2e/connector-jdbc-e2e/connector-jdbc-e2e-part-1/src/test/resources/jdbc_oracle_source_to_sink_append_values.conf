######
###### This config file verifies Oracle APPEND_VALUES insert mode on generated sink SQL.
######

env {
  parallelism = 1
  job.mode = "BATCH"
}

source {
  FakeSource {
    row.num = 100
    schema = {
      columns = [
        {
          name = VARCHAR_10_COL
          type = string
          columnLength = 10
        },
        {
          name = CHAR_10_COL
          type = string
          columnLength = 10
        },
        {
          name = INTEGER_COL
          type = int
        }
      ]
    }
    string.length = 10
  }
}

sink {
  Jdbc {
    driver = oracle.jdbc.driver.OracleDriver
    url = "jdbc:oracle:thin:@e2e_oracleDb:1521/TESTUSER"
    username = testUser
    password = testPassword
    database = XE
    table = "TESTUSER.E2E_TABLE_SINK"
    generate_sink_sql = true
    oracle_insert_mode = APPEND_VALUES
    auto_commit = true
    properties {
       database.oracle.jdbc.timezoneAsRegion = "false"
    }
  }
}
